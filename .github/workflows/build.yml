name: Build packages

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  package:
    name: Package (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            runner: windows-latest
            artifact: CDRipShare-windows-x64
            asset: CDRipShare-windows-x64.zip
          - name: macOS arm64
            runner: macos-latest
            artifact: CDRipShare-macos-arm64
            asset: CDRipShare-macos-arm64.tar.gz
          - name: macOS x64
            runner: macos-15-intel
            artifact: CDRipShare-macos-x64
            asset: CDRipShare-macos-x64.tar.gz
          - name: Linux x64
            runner: ubuntu-latest
            artifact: CDRipShare-linux-x64
            asset: CDRipShare-linux-x64.tar.gz
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxkbcommon-dev libwayland-dev
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release binary
        run: cargo build --release --locked

      - name: Package Windows with FFmpeg
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $package = 'dist/${{ matrix.artifact }}'
          $ffmpegDir = "$package/ffmpeg"
          $archive = "$env:RUNNER_TEMP/ffmpeg.zip"
          $extract = "$env:RUNNER_TEMP/ffmpeg"

          New-Item -ItemType Directory -Force $ffmpegDir | Out-Null
          Copy-Item 'target/release/cdripshare.exe' "$package/CDRipShare.exe"
          Copy-Item 'LICENSE', 'README.md' $package

          Invoke-WebRequest -Uri 'https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip' -OutFile $archive
          Expand-Archive -Path $archive -DestinationPath $extract -Force

          $ffmpeg = Get-ChildItem $extract -Recurse -File -Filter 'ffmpeg.exe' | Select-Object -First 1
          $ffprobe = Get-ChildItem $extract -Recurse -File -Filter 'ffprobe.exe' | Select-Object -First 1
          if (-not $ffmpeg -or -not $ffprobe) {
            throw 'Downloaded archive does not contain ffmpeg.exe and ffprobe.exe'
          }
          Copy-Item $ffmpeg.FullName "$ffmpegDir/ffmpeg.exe"
          Copy-Item $ffprobe.FullName "$ffmpegDir/ffprobe.exe"

          $ffmpegLicense = Get-ChildItem $extract -Recurse -File |
            Where-Object { $_.Name -match '^(LICENSE|COPYING)(\..+)?$' } |
            Select-Object -First 1
          if ($ffmpegLicense) {
            Copy-Item $ffmpegLicense.FullName "$package/FFMPEG-LICENSE.txt"
          } else {
            throw 'Downloaded FFmpeg archive does not contain a license file'
          }

          Compress-Archive -Path "$package/*" -DestinationPath 'dist/${{ matrix.asset }}'

      - name: Package macOS app bundle
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          app="dist/${{ matrix.artifact }}/CDRipShare.app"
          mkdir -p "$app/Contents/MacOS" "$app/Contents/Resources"
          cp target/release/cdripshare "$app/Contents/MacOS/CDRipShare"
          cp LICENSE README.md "$app/Contents/Resources/"
          chmod +x "$app/Contents/MacOS/CDRipShare"
          cat > "$app/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>CDRipShare</string>
            <key>CFBundleIdentifier</key><string>io.github.benderblog.cdripshare</string>
            <key>CFBundleName</key><string>CDRipShare</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>0.1.0</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST
          tar -C "dist/${{ matrix.artifact }}" -czf "dist/${{ matrix.asset }}" CDRipShare.app

      - name: Package Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          package="dist/${{ matrix.artifact }}"
          mkdir -p "$package"
          cp target/release/cdripshare "$package/CDRipShare"
          cp LICENSE README.md "$package/"
          chmod +x "$package/CDRipShare"
          tar -C dist -czf "dist/${{ matrix.asset }}" "${{ matrix.artifact }}"

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.asset }}
          archive: false
          if-no-files-found: error
          retention-days: 14
